<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Hub - Multi-Game Suite</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e74c3c;
            --success: #27ae60;
            --gold: #f1c40f;
            --info: #3498db;
            --shadow: rgba(0,0,0,0.1);
            --bg-light: #fdfdfd;
            --glass: rgba(255, 255, 255, 0.2);
            --tile-bg: #ffffff;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: #eef2f7;
            overflow: hidden;
            touch-action: none; 
            user-select: none;
        }

        .screen { display: none; height: 100vh; width: 100vw; box-sizing: border-box; padding: 20px; position: relative; overflow-y: auto; }
        .active { display: flex; flex-direction: column; align-items: center; }

        /* --- APP LAUNCHER --- */
        #launcher { 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            justify-content: center;
        }
        #launcher h1 { 
            font-size: 2.5rem; 
            margin-bottom: 30px; 
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: center;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }
        .game-card {
            aspect-ratio: 1/1;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.3);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .game-card:active { transform: scale(0.95); }
        .game-card .icon { font-size: 3.5rem; margin-bottom: 10px; }
        .game-card .title { font-weight: bold; font-size: 1.1rem; }

        /* --- SHARED UI --- */
        .btn-action { padding: 8px 14px; border-radius: 20px; border: none; background: white; font-weight: bold; box-shadow: 0 2px 5px var(--shadow); cursor: pointer; font-size: 14px; }
        .header { width: 100%; max-width: 500px; display: flex; align-items: center; margin-bottom: 15px; z-index: 10; gap: 10px; }

        /* --- TILE MATCH --- */
        #tileMatch { background: #2c3e50; color: white; }
        .category-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; max-width: 500px; }
        .cat-card { aspect-ratio: 1/1; background: white; border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .cat-card img { width: 100%; height: 100%; object-fit: cover; }
        .cat-card .cat-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); color: white; font-size: 0.6rem; text-align: center; padding: 4px 0; font-weight: bold; }
        .tile-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 400px; }
        .tile { aspect-ratio: 1/1; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; border: 4px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .tile.selected { border-color: var(--info); }
        .tile.matched { opacity: 0; pointer-events: none; }
        .tile img { width: 85%; height: 85%; object-fit: contain; }
        .tile span { color: #333; font-weight: bold; font-size: 0.7rem; text-align: center; }

        /* --- WORD SEARCH --- */
        #home { background-color: #f9fbff; }
        #levelsGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 100%; max-width: 450px; background: #fff; padding: 15px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .level-card { aspect-ratio: 1/1; background: #eee; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 2px solid transparent; }
        .level-card.locked { opacity: 0.4; cursor: default; }
        .level-card.unlocked { background: var(--info); color: white; }

        #gameView { background: #f0f4f8; overflow: hidden; }
        #wordSearchGrid { 
            display: grid; background: white; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            touch-action: none; position: relative;
            margin: 10px 0;
        }
        .grid-cell { 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 1.2rem; color: #34495e;
            pointer-events: none;
        }
        .grid-cell.highlighted { color: var(--info); }
        
        #wordList {
            display: flex; flex-wrap: wrap; justify-content: center; 
            gap: 10px; max-width: 500px; margin-top: 15px;
        }
        .word-item { 
            padding: 5px 12px; background: white; border-radius: 15px; 
            font-size: 0.9rem; font-weight: 600; color: #7f8c8d;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .word-item.found { text-decoration: line-through; background: #dff9fb; color: #27ae60; opacity: 0.7; }

        #selectionCanvas {
            position: absolute; top: 0; left: 0; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="launcher" class="screen active">
    <h1>CHOOSE A GAME</h1>
    <div class="game-grid">
        <div class="game-card" onclick="showWordSearchHome()">
            <div class="icon">🔍</div>
            <div class="title">Word Search</div>
        </div>
        <div class="game-card" onclick="showTileMatchCategories()">
            <div class="icon">🧩</div>
            <div class="title">Tile Match</div>
        </div>
    </div>
</div>

<div id="tileMatch" class="screen">
    <div class="header">
        <button id="tileBackBtn" class="btn-action" onclick="showLauncher()">🏠 Home</button>
        <h2 id="tileMatchTitle" style="flex-grow: 1; text-align: center; color: white;">Tile Match</h2>
    </div>
    <div id="tileCategorySelection" class="category-grid"></div>
    <div id="tileGameArea" class="tile-grid" style="display: none;"></div>
</div>

<div id="home" class="screen">
    <div class="header">
        <button class="btn-action" onclick="showLauncher()">🏠 Home</button>
        <h2 style="flex-grow: 1; text-align: center;">Levels</h2>
    </div>
    <div id="progressText" style="margin-bottom:10px; font-weight:bold;">PROGRESS: 1 / 20</div>
    <div id="levelsGrid"></div>
</div>

<div id="gameView" class="screen">
    <div class="header">
        <button class="btn-action" onclick="showWordSearchHome()">⬅ Back</button>
        <h2 id="levelTitle" style="flex-grow: 1; text-align: center;">Level 1</h2>
    </div>
    <div id="wordSearchGridContainer" style="position: relative;">
        <div id="wordSearchGrid"></div>
        <canvas id="selectionCanvas"></canvas>
    </div>
    <div id="wordList"></div>
</div>

<script>
// --- SHARED DATA ---
const CATEGORY_NAMES = ["Animals", "Body", "City", "Clothes", "Colours", "Days_Months", "Drinks", "Family", "Food", "Fruits", "Furniture", "House", "Numbers", "People", "Professions", "School", "Sports", "Tools", "Transportation", "Vegetables"];
const WORD_LISTS = {
    "Animals": ["Bear", "Cat", "Dog", "Lion", "Tiger", "Fox", "Wolf", "Deer"],
    "Body": ["Arm", "Leg", "Head", "Eye", "Nose", "Ear", "Hand", "Foot"],
    "City": ["Bank", "Park", "Shop", "Road", "Mall", "Zoo", "Cafe", "Gym"],
    "Clothes": ["Hat", "Coat", "Shoe", "Belt", "Tie", "Sock", "Vest", "Pant"],
    "Colours": ["Red", "Blue", "Pink", "Gold", "Gray", "Teal", "Navy", "Aqua"],
    "Days_Months": ["May", "June", "July", "Mon", "Tue", "Wed", "Thu", "Fri"],
    "Drinks": ["Tea", "Milk", "Soda", "Juice", "Water", "Cola", "Wine", "Beer"],
    "Family": ["Mom", "Dad", "Son", "Aunt", "Wife", "Baby", "Kin", "Sire"],
    "Food": ["Rice", "Egg", "Meat", "Pie", "Cake", "Soup", "Fish", "Bun"],
    "Fruits": ["Pear", "Kiwi", "Plum", "Fig", "Apple", "Mango", "Lime", "Date"],
    "Furniture": ["Bed", "Desk", "Sofa", "Lamp", "Rug", "Mat", "Seat", "Table"],
    "House": ["Wall", "Roof", "Door", "Room", "Bath", "Hall", "Yard", "Step"],
    "Numbers": ["One", "Two", "Four", "Five", "Six", "Nine", "Ten", "Zero"],
    "People": ["Boy", "Girl", "Man", "Lady", "Kid", "User", "Host", "Guest"],
    "Professions": ["Cook", "Chef", "Nurse", "Doc", "Judge", "Pilot", "Actor", "Law"],
    "School": ["Book", "Pen", "Desk", "Glue", "Rule", "Map", "Ink", "Page"],
    "Sports": ["Golf", "Surf", "Swim", "Run", "Dive", "Ski", "Box", "Bowl"],
    "Tools": ["Saw", "Nail", "Drill", "File", "Axe", "Hammer", "Nut", "Bolt"],
    "Transportation": ["Bus", "Car", "Van", "Ship", "Boat", "Tram", "Taxi", "Bike"],
    "Vegetables": ["Corn", "Peas", "Bean", "Kale", "Okra", "Leek", "Yam", "Onion"]
};

// --- SOUNDS ---
const Sound = {
    ctx: null,
    init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    play(freqs, dur) {
        this.init();
        const now = this.ctx.currentTime;
        freqs.forEach((f, i) => {
            const osc = this.ctx.createOscillator(); const g = this.ctx.createGain();
            osc.frequency.setValueAtTime(f, now + (i * 0.05));
            g.gain.setValueAtTime(0.1, now); g.gain.exponentialRampToValueAtTime(0.01, now + dur);
            osc.connect(g); g.connect(this.ctx.destination);
            osc.start(now); osc.stop(now + dur);
        });
    }
};

// --- TILE MATCH ---
function showLauncher() {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('launcher').classList.add('active');
}

function showTileMatchCategories() {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('tileMatch').classList.add('active');
    const container = document.getElementById('tileCategorySelection');
    container.style.display = "grid";
    document.getElementById('tileGameArea').style.display = "none";
    container.innerHTML = "";
    CATEGORY_NAMES.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'cat-card';
        div.innerHTML = `<div class="cat-label">${cat}</div>`;
        div.onclick = () => startTileMatch(cat);
        container.appendChild(div);
    });
}

function startTileMatch(cat) {
    const gameArea = document.getElementById('tileGameArea');
    document.getElementById('tileCategorySelection').style.display = "none";
    gameArea.style.display = "grid";
    gameArea.innerHTML = "";
    const words = WORD_LISTS[cat].slice(0, 4);
    let tiles = [];
    words.forEach(w => { tiles.push({v:w, id:w, t:'w'}); tiles.push({v:w, id:w, t:'i'}); });
    tiles.sort(() => Math.random() - 0.5);
    let first = null;
    tiles.forEach(data => {
        const t = document.createElement('div');
        t.className = 'tile';
        t.innerHTML = `<span>${data.v}</span>`;
        t.onclick = () => {
            if(t.classList.contains('matched') || t.classList.contains('selected')) return;
            t.classList.add('selected');
            if(!first) first = {el:t, d:data};
            else {
                if(first.d.id === data.id && first.d.t !== data.t) {
                    t.classList.add('matched'); first.el.classList.add('matched');
                } else {
                    const prev = first.el;
                    setTimeout(() => { prev.classList.remove('selected'); t.classList.remove('selected'); }, 400);
                }
                first = null;
            }
        };
        gameArea.appendChild(t);
    });
}

// --- WORD SEARCH ENGINE ---
let ws_state = {
    currentLevel: 1,
    words: [],
    foundWords: [],
    grid: [],
    size: 10,
    isDragging: false,
    startCell: null,
    currentCell: null
};

function showWordSearchHome() {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('home').classList.add('active');
    const grid = document.getElementById('levelsGrid');
    grid.innerHTML = "";
    const prog = parseInt(localStorage.getItem('ws_prog')) || 1;
    document.getElementById('progressText').innerText = `PROGRESS: ${prog} / 20`;
    for(let i=1; i<=20; i++) {
        const d = document.createElement('div');
        d.className = `level-card ${i <= prog ? 'unlocked' : 'locked'}`;
        d.innerText = i;
        if(i <= prog) d.onclick = () => startWordSearch(i);
        grid.appendChild(d);
    }
}

function startWordSearch(level) {
    ws_state.currentLevel = level;
    ws_state.foundWords = [];
    const cat = CATEGORY_NAMES[level-1];
    ws_state.words = WORD_LISTS[cat].map(w => w.toUpperCase());
    
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('gameView').classList.add('active');
    document.getElementById('levelTitle').innerText = `${cat} (Lvl ${level})`;
    
    generateGrid();
}

function generateGrid() {
    const size = 10;
    ws_state.size = size;
    let grid = Array(size).fill().map(() => Array(size).fill(''));
    
    // Fill words
    ws_state.words.forEach(word => {
        let placed = false;
        let attempts = 0;
        while(!placed && attempts < 100) {
            let dir = [[0,1],[1,0],[1,1],[0,-1],[-1,0]][Math.floor(Math.random()*3)];
            let r = Math.floor(Math.random()*size);
            let c = Math.floor(Math.random()*size);
            
            if(r + dir[0]*word.length >= 0 && r + dir[0]*word.length < size &&
               c + dir[1]*word.length >= 0 && c + dir[1]*word.length < size) {
                let fits = true;
                for(let i=0; i<word.length; i++) {
                    let char = grid[r+dir[0]*i][c+dir[1]*i];
                    if(char !== '' && char !== word[i]) { fits = false; break; }
                }
                if(fits) {
                    for(let i=0; i<word.length; i++) grid[r+dir[0]*i][c+dir[1]*i] = word[i];
                    placed = true;
                }
            }
            attempts++;
        }
    });

    // Fill randoms
    for(let r=0; r<size; r++) {
        for(let c=0; c<size; c++) {
            if(grid[r][c] === '') grid[r][c] = String.fromCharCode(65 + Math.floor(Math.random()*26));
        }
    }
    
    ws_state.grid = grid;
    renderGrid();
}

function renderGrid() {
    const container = document.getElementById('wordSearchGrid');
    const list = document.getElementById('wordList');
    container.innerHTML = "";
    list.innerHTML = "";
    
    const screenWidth = Math.min(window.innerWidth - 40, 450);
    const cellSize = Math.floor(screenWidth / ws_state.size);
    
    container.style.gridTemplateColumns = `repeat(${ws_state.size}, ${cellSize}px)`;
    container.style.gridTemplateRows = `repeat(${ws_state.size}, ${cellSize}px)`;
    
    ws_state.grid.forEach((row, r) => {
        row.forEach((char, c) => {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            cell.innerText = char;
            cell.dataset.r = r;
            cell.dataset.c = c;
            container.appendChild(cell);
        });
    });

    ws_state.words.forEach(w => {
        const item = document.createElement('div');
        item.className = 'word-item';
        item.innerText = w;
        item.id = `word-${w}`;
        list.appendChild(item);
    });

    // Setup Canvas
    const canvas = document.getElementById('selectionCanvas');
    canvas.width = screenWidth;
    canvas.height = screenWidth;
    
    setupInputListeners(container, cellSize);
}

function setupInputListeners(container, cellSize) {
    const handleStart = (e) => {
        const touch = e.touches ? e.touches[0] : e;
        const rect = container.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;
        const c = Math.floor(x / cellSize);
        const r = Math.floor(y / cellSize);
        
        if(r >= 0 && r < ws_state.size && c >= 0 && c < ws_state.size) {
            ws_state.isDragging = true;
            ws_state.startCell = {r, c};
            ws_state.currentCell = {r, c};
            drawSelection();
        }
    };

    const handleMove = (e) => {
        if(!ws_state.isDragging) return;
        const touch = e.touches ? e.touches[0] : e;
        const rect = container.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;
        const c = Math.floor(x / cellSize);
        const r = Math.floor(y / cellSize);
        
        if(r >= 0 && r < ws_state.size && c >= 0 && c < ws_state.size) {
            if(ws_state.currentCell.r !== r || ws_state.currentCell.c !== c) {
                ws_state.currentCell = {r, c};
                drawSelection();
            }
        }
    };

    const handleEnd = () => {
        if(!ws_state.isDragging) return;
        checkSelection();
        ws_state.isDragging = false;
        const ctx = document.getElementById('selectionCanvas').getContext('2d');
        ctx.clearRect(0, 0, 1000, 1000);
    };

    container.onmousedown = handleStart;
    window.onmousemove = handleMove;
    window.onmouseup = handleEnd;
    
    container.ontouchstart = (e) => { e.preventDefault(); handleStart(e); };
    container.ontouchmove = (e) => { e.preventDefault(); handleMove(e); };
    container.ontouchend = (e) => { e.preventDefault(); handleEnd(); };
}

function drawSelection() {
    const canvas = document.getElementById('selectionCanvas');
    const ctx = canvas.getContext('2d');
    const cellSize = canvas.width / ws_state.size;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const startX = ws_state.startCell.c * cellSize + cellSize/2;
    const startY = ws_state.startCell.r * cellSize + cellSize/2;
    const endX = ws_state.currentCell.c * cellSize + cellSize/2;
    const endY = ws_state.currentCell.r * cellSize + cellSize/2;
    
    ctx.lineCap = 'round';
    ctx.lineWidth = cellSize * 0.7;
    ctx.strokeStyle = 'rgba(52, 152, 219, 0.3)';
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.stroke();
}

function checkSelection() {
    const s = ws_state.startCell;
    const e = ws_state.currentCell;
    
    let dr = e.r - s.r;
    let dc = e.c - s.c;
    let dist = Math.max(Math.abs(dr), Math.abs(dc));
    
    if(dist === 0) return;
    
    // Normalize step
    let sr = dr === 0 ? 0 : dr / Math.abs(dr);
    let sc = dc === 0 ? 0 : dc / Math.abs(dc);
    
    // Check if straight line
    if(dr !== 0 && dc !== 0 && Math.abs(dr) !== Math.abs(dc)) return;
    
    let selectedText = "";
    for(let i=0; i<=dist; i++) {
        selectedText += ws_state.grid[s.r + sr*i][s.c + sc*i];
    }
    
    if(ws_state.words.includes(selectedText) && !ws_state.foundWords.includes(selectedText)) {
        ws_state.foundWords.push(selectedText);
        document.getElementById(`word-${selectedText}`).classList.add('found');
        Sound.play([440, 880], 0.2);
        
        if(ws_state.foundWords.length === ws_state.words.length) {
            setTimeout(() => {
                Sound.play([523, 659, 783], 0.5);
                const next = ws_state.currentLevel + 1;
                localStorage.setItem('ws_prog', Math.max(next, parseInt(localStorage.getItem('ws_prog')||1)));
                showWordSearchHome();
            }, 1000);
        }
    }
}

window.onload = () => showLauncher();
</script>
</body>
</html>
